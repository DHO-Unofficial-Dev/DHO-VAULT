<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>DHO-VAULT</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">DHO RESOURCE VAULT</p>
        <h1>DHO-VAULT</h1>
        <p class="summary">
          대항해시대 온라인 클라이언트의 이미지 리소스를 찾아보고 저장하는 도구
        </p>
      </header>

      <section class="picker-card" aria-labelledby="picker-title">
        <div>
          <h2 id="picker-title">게임 폴더 연결</h2>
          <p>GVOnline.exe가 있는 대항해시대 온라인 설치 폴더를 선택하세요.</p>
        </div>
        <button id="select-game-directory" type="button">게임 폴더 선택</button>
      </section>

      <section class="status-card" aria-labelledby="status-title" aria-live="polite">
        <div class="status-mark" aria-hidden="true"></div>
        <div class="status-content">
          <h2 id="status-title">게임 폴더를 선택해 주세요</h2>
          <p id="status-message">
            파일을 변경하지 않고 지원하는 MWC 인덱스의 기본 정보만 확인합니다.
          </p>
          <dl id="directory-details" class="directory-details" hidden>
            <div>
              <dt>게임 폴더</dt>
              <dd id="game-directory"></dd>
            </div>
            <div>
              <dt>리소스 폴더</dt>
              <dd id="resource-directory"></dd>
            </div>
          </dl>
          <ul id="archive-list" class="archive-list" aria-label="확인한 MWC 인덱스"></ul>
        </div>
      </section>
    </main>
  </body>
</html>
