<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>DHO-VAULT</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">DHO RESOURCE VAULT</p>
        <h1>DHO-VAULT</h1>
        <p class="summary">
          대항해시대 온라인 클라이언트의 이미지 리소스를 찾아보고 저장하는 도구
        </p>
      </header>

      <section class="status-card" aria-labelledby="status-title">
        <div class="status-mark" aria-hidden="true"></div>
        <div>
          <h2 id="status-title">기본 실행 환경을 준비했습니다</h2>
          <p>
            게임 폴더 선택, 리소스 검색, 미리보기와 다운로드 기능을 다음 단계부터
            차례로 연결합니다.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
