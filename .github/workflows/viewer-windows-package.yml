# SPDX-License-Identifier: MPL-2.0

name: Viewer Windows 패키지

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/viewer-windows-package.yml"
      - "apps/viewer/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: 소스 받기
        uses: actions/checkout@v7

      - name: 태그와 제품 버전 확인
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $config = Get-Content apps/viewer/src-tauri/tauri.conf.json | ConvertFrom-Json
          $expectedTag = "v$($config.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "태그 $env:GITHUB_REF_NAME 와 제품 버전 $($config.version) 이 일치하지 않습니다."
          }

      - name: Rust 안정 버전 준비
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable

      - name: Node.js 24 준비
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: 전체 테스트
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: cargo test --workspace --locked

      - name: Viewer 빌드
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        working-directory: apps/viewer/src-tauri
        run: npx --yes @tauri-apps/cli@2.11.4 build

      - name: Viewer 릴리스 빌드
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        working-directory: apps/viewer/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx --yes @tauri-apps/cli@2.11.4 build --config tauri.release.conf.json

      - name: 배포 파일 정리
        shell: pwsh
        run: |
          $config = Get-Content apps/viewer/src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $config.version
          $dist = Join-Path $PWD "dist"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          $portableName = "DHO-Vault_${version}_x64-portable.exe"
          Copy-Item target/release/dho-viewer.exe (Join-Path $dist $portableName)

          $installers = @(Get-ChildItem target/release/bundle/nsis -File -Filter "*_x64-setup.exe")
          if ($installers.Count -ne 1) {
            throw "NSIS 설치 파일이 정확히 한 개여야 합니다: $($installers.Count)개"
          }
          $setupName = "DHO-Vault_${version}_x64-setup.exe"
          Copy-Item $installers[0].FullName (Join-Path $dist $setupName)

          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $signaturePath = "$($installers[0].FullName).sig"
            if (-not (Test-Path -LiteralPath $signaturePath -PathType Leaf)) {
              throw "업데이트 서명 파일을 찾지 못했습니다: $signaturePath"
            }

            Copy-Item $signaturePath (Join-Path $dist "$setupName.sig")

            $signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim()
            $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$setupName"
            $releaseNotes = Get-Content RELEASE_NOTES.md -Raw
            $latest = [ordered]@{
              version = $version
              notes = $releaseNotes
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = [ordered]@{
                "windows-x86_64" = [ordered]@{
                  signature = $signature
                  url = $downloadUrl
                }
              }
            }
            $latest | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $dist "latest.json") -Encoding utf8
          }

          $hashes = Get-ChildItem $dist -File |
            Where-Object Name -NotIn @("SHA256SUMS.txt", "latest.json") |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          Set-Content -Path (Join-Path $dist "SHA256SUMS.txt") -Value $hashes -Encoding utf8

      - name: 패키지 보관
        uses: actions/upload-artifact@v7
        with:
          name: DHO-Vault-windows-x64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 소스 받기
        uses: actions/checkout@v7

      - name: 배포 파일 받기
        uses: actions/download-artifact@v8
        with:
          name: DHO-Vault-windows-x64
          path: dist

      - name: GitHub Release 생성
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(jq -r '.version' apps/viewer/src-tauri/tauri.conf.json)"
          release_flags=()
          if [[ "$version" == *-* ]]; then
            release_flags+=(--prerelease --latest=false)
          fi

          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "DHO Vault $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            "${release_flags[@]}"

      - name: RC 업데이트 채널 갱신
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view updater-rc --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload updater-rc dist/latest.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create updater-rc dist/latest.json \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --latest=false \
              --title "DHO Vault RC 업데이트 채널" \
              --notes "RC 설치판의 자동 업데이트 검증에 사용하는 메타데이터 채널입니다."
          fi
